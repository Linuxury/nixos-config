# ===========================================================================
# hypridle.conf — Idle management
#
# Timeline:
#   2 min  — dim screen (laptops only, skipped on desktops)
#   3 min  — lock with hyprlock
#   10 min — suspend (ThinkPad only, Ryzen5900x logind handles this)
#
# Dim uses conditional scripts that check for backlight device.
# ===========================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock       # Don't launch if already running
    before_sleep_cmd = loginctl lock-session     # Lock before systemd suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # Wake screen after resume
}

# Dim screen after 2 minutes of inactivity (laptops only)
listener {
    timeout = 120
    on-timeout = ~/.config/hypr/scripts/dim-screen.sh
    on-resume = ~/.config/hypr/scripts/restore-brightness.sh
}

# Lock screen after 3 minutes of inactivity
listener {
    timeout = 180
    on-timeout = loginctl lock-session
}

# Suspend after 10 minutes of inactivity
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
