# ===========================================================================
# dotfiles/hypr/hyprland.conf — Hyprland entry point
#
# This file only sources modules. All actual configuration lives in
# modules/ — one concern per file, easy to find and edit.
#
# Load order matters for variable resolution ($mod is set in keybinds.conf
# and used there too, so it must be sourced before any bind declarations).
# ===========================================================================

source = ~/.config/hypr/modules/environment.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/modules/appearance.conf
source = ~/.config/hypr/modules/windowrules.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/keybinds.conf
