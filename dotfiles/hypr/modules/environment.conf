# ===========================================================================
# modules/environment.conf — Environment variables
#
# These are set inside the Hyprland session so every app launched from
# Hyprland inherits them. Cursor, toolkit backends, and session identity
# all live here.
# ===========================================================================

# Cursor — match the BreezeX-Light theme set in cosmic-theme.nix
env = XCURSOR_THEME,BreezeX-Light
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,BreezeX-Light
env = HYPRCURSOR_SIZE,24

# Session identity — tells apps they're running under Hyprland/Wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK — prefer Wayland backend, fall back to X11 for anything that needs it
env = GDK_BACKEND,wayland,x11,*

# Qt — run natively on Wayland; qt6ct handles theme (nwg-look for GTK)
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Firefox / Electron — force native Wayland renderer
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# SDL2 apps (games, etc.) — use Wayland
env = SDL_VIDEODRIVER,wayland

# Java apps (e.g. Minecraft launchers) — fix blank window bug on tiling WMs
env = _JAVA_AWT_WM_NONREPARENTING,1
