# ===========================================================================
# modules/input.conf — Keyboard, touchpad, and mouse settings
# ===========================================================================

input {
    kb_layout  = us
    kb_options = caps:escape    # Caps Lock → Escape (very useful in Neovim)

    # Mouse — no acceleration, raw input feels more precise
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll       = true   # Scroll direction like macOS
        tap-to-click         = true   # Tap = left click
        tap-and-drag         = true   # Tap + hold = drag
        drag_lock            = false
        disable_while_typing = true
        scroll_factor        = 0.8    # Slightly slower scroll speed
    }
}

# Three-finger swipe between workspaces
gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
    workspace_swipe_cancel_ratio = 0.3
}
