# ===========================================================================
# modules/autostart.conf — Apps and daemons that start with Hyprland
#
# exec-once = runs once at session start, never again until next login
# exec       = runs every time the config is reloaded (hyprctl reload)
# ===========================================================================

# ---------------------------------------------------------------------------
# Wallpaper — swww
#
# swww-daemon must start before any swww img command is sent.
# The sleep gives the daemon time to initialize before setting the wallpaper.
# set-wallpaper.sh picks a random image, sets it via swww, and runs matugen.
exec-once = swww-daemon
exec-once = sleep 1 && ~/.config/hypr/scripts/set-wallpaper.sh
exec-once = ~/.config/hypr/scripts/wallpaper-rotate.sh

# ---------------------------------------------------------------------------
# Status bar — managed by systemd (auto-restarts on crash)
# Started by: systemd user service waybar.service (WantedBy=graphical-session.target)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
exec-once = swaync

# ---------------------------------------------------------------------------
# OSD — center-bottom overlay for volume/brightness
# ---------------------------------------------------------------------------
exec-once = swayosd-server

# ---------------------------------------------------------------------------
# Idle management — dim, lock, suspend
# ---------------------------------------------------------------------------
exec-once = hypridle

# ---------------------------------------------------------------------------
# Polkit authentication agent
# Needed for GUI apps to request elevated permissions (pkexec, gvfs mounts, etc.)
# ---------------------------------------------------------------------------
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1

# ---------------------------------------------------------------------------
# System tray daemons
# ---------------------------------------------------------------------------
exec-once = nm-applet --indicator   # Network manager tray icon
exec-once = blueman-applet          # Bluetooth tray icon

# ---------------------------------------------------------------------------
# Clipboard history — wl-clipboard + cliphist
# Watches clipboard for text and images, stores history for SUPER+V picker
# ---------------------------------------------------------------------------
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ---------------------------------------------------------------------------
# Night light — auto warm colors at sunset (8 PM)
# ---------------------------------------------------------------------------
exec-once = ~/.config/hypr/scripts/nightlight.sh on

# ---------------------------------------------------------------------------
# Host-specific overrides — runs at login after Hyprland fully starts
# Sets per-display opacity (e.g. OLED needs lower opacity than LCD)
# ---------------------------------------------------------------------------
exec-once = ~/.config/hypr/scripts/host-overrides.sh
