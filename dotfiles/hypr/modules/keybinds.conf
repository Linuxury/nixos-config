# ===========================================================================
# modules/keybinds.conf — All keyboard and mouse bindings
#
# Bind flags:
#   bind   = normal key press
#   bindm  = mouse button (for window move/resize)
#   bindel = allows repeat while held (volume, brightness)
#   bindl  = works even when screen is locked
# ===========================================================================

$mod = SUPER

# ---------------------------------------------------------------------------
# Core apps
# ---------------------------------------------------------------------------
bind = $mod,       Return,  exec, kitty
bind = $mod,       Space,   exec, wofi --show drun --normal-window
bind = $mod,       R,       exec, wofi --show run --normal-window
bind = $mod,       E,       exec, nemo
bind = $mod SHIFT, Return,  exec, kitty --class floating-term

# ---------------------------------------------------------------------------
# Scrolling layout
# ---------------------------------------------------------------------------
bind = $mod,       period,  layoutmsg, colresize +conf   # Cycle column width (50% → 67% → 100% → 33%)
bind = $mod,       comma,   layoutmsg, colresize -conf   # Cycle column width reverse
bind = $mod CTRL,  right,   layoutmsg, move +col         # Scroll layout right
bind = $mod CTRL,  left,    layoutmsg, move -col         # Scroll layout left
bind = $mod SHIFT, comma,   layoutmsg, swapcol l         # Swap column left
bind = $mod SHIFT, period,  layoutmsg, swapcol r         # Swap column right

# ---------------------------------------------------------------------------
# Window management
# ---------------------------------------------------------------------------
bind = $mod,       Q,       killactive
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       togglefloating
bind = $mod,       P,       pseudo                  # Dwindle pseudotile
bind = $mod,       J,       togglesplit             # Dwindle split direction

# Move focus — arrow keys + vim keys
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d     # Note: conflicts with togglesplit above — remove one if needed

# Move windows — arrow keys + vim keys
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Resize windows with keyboard
bind = $mod ALT, left,  resizeactive, -40 0
bind = $mod ALT, right, resizeactive,  40 0
bind = $mod ALT, up,    resizeactive,  0 -40
bind = $mod ALT, down,  resizeactive,  0  40
bind = $mod ALT, H,     resizeactive, -40 0
bind = $mod ALT, L,     resizeactive,  40 0
bind = $mod ALT, K,     resizeactive,  0 -40
bind = $mod ALT, J,     resizeactive,  0  40

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow    # SUPER + left click drag  = move
bindm = $mod, mouse:273, resizewindow  # SUPER + right click drag = resize

# ---------------------------------------------------------------------------
# Workspaces — switch and move windows
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces with mousewheel on waybar / empty desktop
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Special workspace (scratchpad)
bind = $mod,       S, togglespecialworkspace, scratch
bind = $mod SHIFT, S, movetoworkspace,        special:scratch

# ---------------------------------------------------------------------------
# Screenshots — grim + slurp + swappy (annotate) / wl-copy (clipboard)
bind = ,             Print,   exec, grim -g "$(slurp)" - | swappy -f -   # Region → annotate
bind = $mod,         Print,   exec, grim - | swappy -f -                  # Full screen → annotate
bind = $mod,         Z,       exec, grim -g "$(slurp)" - | swappy -f -   # Region → annotate (65%)
bind = $mod,         X,       exec, grim - | swappy -f -                  # Full screen → annotate (65%)
bind = SHIFT,        Print,   exec, grim -g "$(slurp)" - | wl-copy       # Region → clipboard
bind = $mod SHIFT,   Print,   exec, grim - | wl-copy                      # Full screen → clipboard

# ---------------------------------------------------------------------------
# Screen recording — wf-recorder (toggle start/stop)
# ---------------------------------------------------------------------------
bind = $mod ALT,       R,       exec, ~/.config/hypr/scripts/screen-record.sh area        # Area select
bind = $mod ALT SHIFT, R,       exec, ~/.config/hypr/scripts/screen-record.sh fullscreen  # Full screen

# ---------------------------------------------------------------------------
# Screen lock
# ---------------------------------------------------------------------------
bind = $mod, Escape, exec, hyprlock

# ---------------------------------------------------------------------------
# Notification center (swaync)
# ---------------------------------------------------------------------------
bind = $mod, N, exec, swaync-client -t   # Toggle notification panel

# ---------------------------------------------------------------------------
# Clipboard history (cliphist + wofi)
# ---------------------------------------------------------------------------
bind = $mod, V, exec, cliphist list | wofi --dmenu --normal-window --style ~/.config/wofi/style.css | cliphist decode | wl-copy

# ---------------------------------------------------------------------------
# Audio — volume with wob overlay
# ---------------------------------------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f\n", $2 * 100}' > $XDG_RUNTIME_DIR/wob.sock
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f\n", $2 * 100}' > $XDG_RUNTIME_DIR/wob.sock
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && (wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo 0 > $XDG_RUNTIME_DIR/wob.sock || wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f\n", $2 * 100}' > $XDG_RUNTIME_DIR/wob.sock)
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# ---------------------------------------------------------------------------
# Brightness — brightnessctl (ThinkPad hardware keys)
# ---------------------------------------------------------------------------
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ---------------------------------------------------------------------------
# Exit / reload
# ---------------------------------------------------------------------------
bind = $mod SHIFT, E, exec, ~/.config/hypr/scripts/powermenu.sh   # Power menu
bind = $mod SHIFT, R, exec, hyprctl reload                         # Reload config without restarting
bind = $mod SHIFT, N, exec, ~/.config/hypr/scripts/nightlight.sh  # Night light toggle
