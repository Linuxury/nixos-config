# ===========================================================================
# modules/windowrules.conf — Per-app window behavior
#
# Format: windowrule = rule, matcher
# Common matchers: class:^(app-id)$, title:^(window title)$
# ===========================================================================

# ---------------------------------------------------------------------------
# Global — suppress maximize requests from apps that don't know better
# ---------------------------------------------------------------------------
windowrule = suppressevent maximize, class:.*

# ---------------------------------------------------------------------------
# Floating windows — dialogs, settings, and small utilities
# ---------------------------------------------------------------------------
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(nwg-look)$
windowrule = float, class:^(qt6ct)$
windowrule = float, class:^(gnome-disks)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save File)(.*)$
windowrule = float, title:^(File Upload)(.*)$

# Floating kitty — launched with SUPER+SHIFT+Return as a quick terminal
windowrule = float,      class:^(floating-term)$
windowrule = size  50% 60%, class:^(floating-term)$
windowrule = center,     class:^(floating-term)$

# ---------------------------------------------------------------------------
# Picture-in-picture — keep on top and floating
# ---------------------------------------------------------------------------
windowrule = float,    title:^(Picture-in-Picture)$
windowrule = pin,      title:^(Picture-in-Picture)$
windowrule = keepaspectratio, title:^(Picture-in-Picture)$

# ---------------------------------------------------------------------------
# XWayland — fix for apps that misbehave as native Wayland
# ---------------------------------------------------------------------------
windowrule = rounding 0, xwayland:1   # Don't round X11 windows (looks bad)

# ---------------------------------------------------------------------------
# Idle inhibit — prevent screen lock while these are running fullscreen
# ---------------------------------------------------------------------------
windowrule = idleinhibit fullscreen, class:.*
windowrule = idleinhibit focus, class:^(mpv)$
