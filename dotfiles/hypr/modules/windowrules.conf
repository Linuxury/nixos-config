# ===========================================================================
# modules/windowrules.conf — Per-app window behavior
#
# Format: windowrulev2 = rule, matcher
# Common matchers: class:^(app-id)$, title:^(window title)$
# ===========================================================================

# ---------------------------------------------------------------------------
# Global — suppress maximize requests from apps that don't know better
# ---------------------------------------------------------------------------
windowrulev2 = suppressevent maximize, class:.*

# ---------------------------------------------------------------------------
# Floating windows — dialogs, settings, and small utilities
# ---------------------------------------------------------------------------
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(gnome-disks)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(File Upload)(.*)$

# Floating kitty — launched with SUPER+SHIFT+Return as a quick terminal
windowrulev2 = float,      class:^(floating-term)$
windowrulev2 = size  50% 60%, class:^(floating-term)$
windowrulev2 = center,     class:^(floating-term)$

# ---------------------------------------------------------------------------
# Picture-in-picture — keep on top and floating
# ---------------------------------------------------------------------------
windowrulev2 = float,    title:^(Picture-in-Picture)$
windowrulev2 = pin,      title:^(Picture-in-Picture)$
windowrulev2 = keepaspectratio, title:^(Picture-in-Picture)$

# ---------------------------------------------------------------------------
# XWayland — fix for apps that misbehave as native Wayland
# ---------------------------------------------------------------------------
windowrulev2 = rounding 0, xwayland:1   # Don't round X11 windows (looks bad)

# ---------------------------------------------------------------------------
# Idle inhibit — prevent screen lock while these are running fullscreen
# ---------------------------------------------------------------------------
windowrulev2 = idleinhibit fullscreen, class:.*
windowrulev2 = idleinhibit focus, class:^(mpv)$
