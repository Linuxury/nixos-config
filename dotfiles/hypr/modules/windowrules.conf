# ===========================================================================
# modules/windowrules.conf — Per-app window behavior
#
# Hyprland 0.46+ syntax:
#   windowrule = effect [value], match:prop regex
#   windowrule = match:prop regex, effect [value]
#   (order of props/effects doesn't matter)
# ===========================================================================

# ---------------------------------------------------------------------------
# Global — suppress maximize requests from apps that don't know better
# ---------------------------------------------------------------------------
windowrule = suppress_event maximize, match:class .*

# ---------------------------------------------------------------------------
# Workspace assignments
# ---------------------------------------------------------------------------
# WS 1: Regular apps (default — no rule needed)
# WS 2: Games / fullscreen
# WS 3: Steam
windowrule = workspace 3 silent, match:class steam

# Games → WS 2
windowrule = workspace 2 silent, match:class gamescope
windowrule = workspace 2 silent, match:class lutris
windowrule = workspace 2 silent, match:class heroic
windowrule = workspace 2 silent, match:class minecraft-launcher

# Fullscreen apps → WS 2
windowrule = workspace 2 silent, match:fullscreen true

# ---------------------------------------------------------------------------
# Floating windows — dialogs, settings, and small utilities
# ---------------------------------------------------------------------------
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class nwg-look
windowrule = float on, match:class qt6ct
windowrule = float on, match:class gnome-disks
windowrule = float on, match:title Open File
windowrule = float on, match:title Save File
windowrule = float on, match:title File Upload

# Floating kitty — launched with SUPER+SHIFT+Return as a quick terminal
windowrule = float on,                              match:class floating-term
windowrule = size (monitor_w*0.5) (monitor_h*0.6), match:class floating-term
windowrule = center on,                             match:class floating-term

# Kitty transparency — Hyprland controls opacity, Kitty's own settings disabled
# 0.75 active, 0.6 inactive — override prevents product multiplication
# Props (match:) go left, effects (opacity) go right per Hyprland 0.54+ syntax
windowrule = match:class kitty, opacity 0.75 override 0.6 override

# Nemo — GTK file manager transparency
windowrule = match:class nemo, opacity 0.85 override 0.75 override

# Wofi — rounded corners with transparent corners (Hyprland handles clipping)
windowrule = rounding 10, match:class wofi
windowrule = float on,     match:class wofi
windowrule = center on,    match:class wofi

# Wofi powermenu — rounded, floating, centered, sized
windowrule = rounding 10, match:class powermenu
windowrule = float on,     match:class powermenu
windowrule = center on,    match:class powermenu

windowrule = rounding 10, match:class powermenu-small
windowrule = float on,     match:class powermenu-small
windowrule = center on,    match:class powermenu-small

# ---------------------------------------------------------------------------
# Picture-in-picture — keep on top and floating
# ---------------------------------------------------------------------------
windowrule = float on,            match:title Picture-in-Picture
windowrule = pin on,              match:title Picture-in-Picture
windowrule = keep_aspect_ratio on, match:title Picture-in-Picture

# ---------------------------------------------------------------------------
# Wine/Proton — hide Battle.net's native XEmbed tray icon window
# We use a custom waybar module instead.
# Matches the small floating window with empty title (160x20 tray icon).
# Shrunk to 1x1 and pushed to bottom-left corner, out of sight.
# ---------------------------------------------------------------------------
windowrule = float on,    match:class steam_app_0, match:title ^$
windowrule = size 1 1,    match:class steam_app_0, match:title ^$
windowrule = move 0 1439, match:class steam_app_0, match:title ^$

# ---------------------------------------------------------------------------
# XWayland — disable rounding on X11 windows (looks bad)
# ---------------------------------------------------------------------------
windowrule = rounding 0, match:xwayland true

# ---------------------------------------------------------------------------
# SwayNC layers — control center + notification toasts
# ---------------------------------------------------------------------------
layerrule = animation slide right, match:namespace swaync/control-center
layerrule = animation slide right, match:namespace swaync/notification-window

# ---------------------------------------------------------------------------
# Idle inhibit — prevent screen lock while these are active
# ---------------------------------------------------------------------------
windowrule = idle_inhibit fullscreen, match:class .*
windowrule = idle_inhibit focus,      match:class mpv
