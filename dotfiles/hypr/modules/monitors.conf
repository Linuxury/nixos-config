# ===========================================================================
# modules/monitors.conf — Monitor layout
#
# Format: monitor=name,resolution@hz,position,scale[,extra params]
#
# The catch-all rule below auto-detects preferred resolution and refresh
# rate for any connected display. This works on both ThinkPad (1920x1200)
# and Ryzen5900x (3440x1440) without any changes.
#
# The catch-all must always be last — Hyprland matches top to bottom.
# ===========================================================================

# Ryzen5900x — LG 34" ultrawide (3440x1440, 240Hz, VRR, HDR)
# bitdepth,10 = 10-bit color (required for HDR)
# cm,hdr      = color management with HDR PQ transfer function
monitor=DP-3,3440x1440@240,0x0,1,bitdepth,10,cm,hdr,sdrbrightness,1.3,sdrsaturation,0.98

# Catch-all — ThinkPad built-in display and any unknown outputs
monitor=,preferred,auto,1
