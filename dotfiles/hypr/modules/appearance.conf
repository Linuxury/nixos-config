# ===========================================================================
# modules/appearance.conf — Visual style: gaps, borders, blur, animations
#
# Colors here are placeholders — matugen will override them at runtime
# by writing to ~/.config/hypr/colors.conf once the pipeline is set up.
# For now these are reasonable defaults that look good from day one.
# ===========================================================================

general {
    gaps_in              = 5
    gaps_out             = 10
    border_size          = 2

    # Active / inactive border — colors from matugen (colors.conf)
    col.active_border    = $primary $tertiary 45deg
    col.inactive_border  = $outline_variant

    layout               = scrolling
    resize_on_border     = true   # Drag window edges to resize
}

decoration {
    rounding = 10

    # Blur — frosted glass effect on transparent windows (kitty, waybar, wofi)
    blur {
        enabled          = true
        size             = 8
        passes           = 2
        new_optimizations = true
        vibrancy         = 0.17
    }

    # Shadows — subtle depth without being heavy
    shadow {
        enabled          = true
        range            = 12
        render_power     = 3
        color            = rgba(00000055)
    }
}

animations {
    enabled = true

    # Custom bezier curves
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutSine,  0.37, 0,    0.63, 1
    bezier = easeOutBack,    0.34, 1.56, 0.64, 1   # Slight overshoot — feels snappy

    # Windows
    animation = windows,    1, 4, easeOutBack,    slide
    animation = windowsOut, 1, 3, easeInOutSine,  popin 80%
    animation = windowsMove,1, 3, easeOutQuint

    # Borders
    animation = border,     1, 6, default
    animation = borderangle,1, 60, linear, loop   # Rotating gradient on active border

    # Fades
    animation = fade,       1, 3, easeInOutSine
    animation = fadeOut,    1, 3, easeInOutSine

    # Workspaces
    animation = workspaces, 1, 4, easeOutQuint, slide
}

dwindle {
    pseudotile      = true   # SUPER + P toggles pseudotiling
    preserve_split  = true   # Split direction is remembered per-split
    smart_split     = false
    smart_resizing  = true
}

master {
    new_status = master
}

scrolling {
    fullscreen_on_one_column = false
    column_width             = 0.5
    direction                = right
}

# Workspace layouts
workspace = 1, layout:scrolling, default:true
workspace = 2, layout:dwindle
workspace = 3, layout:master

render {
    direct_scanout    = 0   # Disabled — causes flickering when entering/leaving fullscreen
}

misc {
    force_default_wallpaper = 0   # Don't show Hyprland anime girl
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    animate_manual_resizes  = true
    vrr                     = 2   # VRR fullscreen-only — avoids desktop flickering at 240Hz
}

