# ===========================================================================
# hyprlock.conf — Screen locker
#
# Background: blurred screenshot of the current screen.
# Center: large clock + date label + password input field.
# ===========================================================================

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

# ---------------------------------------------------------------------------
# Background — screenshot with blur
# ---------------------------------------------------------------------------
background {
    monitor    =
    path       = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.5
    contrast    = 0.9
    vibrancy    = 0.2
    vibrancy_darkness = 0.0
}

# ---------------------------------------------------------------------------
# Clock — large, centered above input
# ---------------------------------------------------------------------------
label {
    monitor   =
    text      = cmd[update:1000] echo "$(date +"%H:%M")"
    color     = rgba(cdd6f4, 0.95)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, 120
    halign   = center
    valign   = center
}

# ---------------------------------------------------------------------------
# Date — smaller, just below clock
# ---------------------------------------------------------------------------
label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color     = rgba(a6adc8, 0.85)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, 30
    halign   = center
    valign   = center
}

# ---------------------------------------------------------------------------
# Password input field
# ---------------------------------------------------------------------------
input-field {
    monitor =

    size             = 280, 52
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.15
    dots_center      = true

    outer_color  = rgb(89b4fa)
    inner_color  = rgb(1e1e2e)
    font_color   = rgb(cdd6f4)
    check_color  = rgb(a6e3a1)
    fail_color   = rgb(f38ba8)

    rounding         = 10
    fade_on_empty    = true
    placeholder_text = <i>Password...</i>
    hide_input       = false

    fail_text        = <i>Wrong — $ATTEMPTS attempt(s)</i>

    position = 0, -80
    halign   = center
    valign   = center
}
