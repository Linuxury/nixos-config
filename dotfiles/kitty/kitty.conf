# ===========================================================================
# Kitty terminal configuration
#
# Colors are injected by matugen on each wallpaper change via:
#   ~/.config/kitty/colors.conf
# Do not edit the colors file directly — it is regenerated automatically.
# Reload signal: pkill -USR1 kitty
# ===========================================================================

include ~/.config/kitty/colors.conf

# ---------------------------------------------------------------------------
# Font
# ---------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Propo
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Ligatures — keep them enabled for arrow operators etc.
disable_ligatures never

# ---------------------------------------------------------------------------
# Window appearance
# ---------------------------------------------------------------------------
background_opacity  0.85

# Padding inside the window (top/bottom left/right)
window_padding_width 10 14

# Resize in smooth increments
resize_in_steps no

# ---------------------------------------------------------------------------
# Cursor
# ---------------------------------------------------------------------------
cursor_shape                    beam
cursor_beam_thickness           1.8
cursor_blink_interval           0.5
cursor_stop_blinking_after      0.0
cursor_trail                    1
cursor_trail_decay              0.1 0.4
cursor_trail_start_threshold    2

# ---------------------------------------------------------------------------
# Scrollback
# ---------------------------------------------------------------------------
scrollback_lines 10000

# ---------------------------------------------------------------------------
# URL handling
# ---------------------------------------------------------------------------
url_style     curly
open_url_with default
detect_urls   yes

# ---------------------------------------------------------------------------
# Tab bar
# ---------------------------------------------------------------------------
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_title_template      " {index}: {title} "
active_tab_font_style   bold
inactive_tab_font_style normal

# ---------------------------------------------------------------------------
# Bell
# ---------------------------------------------------------------------------
enable_audio_bell     no
visual_bell_duration  0.1

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------
repaint_delay 10
input_delay   3
sync_to_monitor yes
confirm_os_window_close 1


# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------

# Tabs
map ctrl+shift+t       new_tab_with_cwd
map ctrl+shift+w       close_tab
map ctrl+shift+]       next_tab
map ctrl+shift+[       previous_tab
map ctrl+shift+alt+t   set_tab_title

# Windows / splits
map ctrl+shift+enter   new_window_with_cwd
map ctrl+shift+n       new_os_window_with_cwd
map ctrl+shift+q       close_window
map ctrl+shift+h       neighboring_window left
map ctrl+shift+l       neighboring_window right
map ctrl+shift+k       neighboring_window up
map ctrl+shift+j       neighboring_window down

# Font size
map ctrl+shift+equal   change_font_size all +1.0
map ctrl+shift+minus   change_font_size all -1.0
map ctrl+shift+0       change_font_size all 0

# Clipboard
map ctrl+shift+c       copy_to_clipboard
map ctrl+shift+v       paste_from_clipboard

# Scrollback
map ctrl+shift+f       show_scrollback
map ctrl+shift+g       show_last_command_output
